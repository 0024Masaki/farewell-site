<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真投稿</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <h1>写真投稿</h1>

    <p class="subtitle">
        送別会の写真を投稿してください
    </p>

    <form id="photoForm" class="form-area">

        <label class="form-label" for="name">
            お名前・ニックネーム 任意
        </label>
        <input type="text" id="name" class="input" maxlength="30" placeholder="匿名でもOK">

        <label class="form-label" for="comment">
            コメント 任意
        </label>
        <textarea id="comment" class="textarea small-textarea" maxlength="200" placeholder="写真への一言"></textarea>

        <label class="form-label" for="photo">
            写真
        </label>
        <input type="file" id="photo" class="input" accept="image/jpeg,image/png,image/webp" required>

        <button type="submit" class="button button-submit">
            写真を投稿する
        </button>

    </form>

    <p id="resultMessage" class="result-message"></p>

    <a class="button button-secondary" href="index.html">
        トップへ戻る
    </a>

</div>

<script>
const form = document.getElementById("photoForm");
const resultMessage = document.getElementById("resultMessage");

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const file = document.getElementById("photo").files[0];

    if (!file) {
        resultMessage.textContent = "写真を選択してください。";
        return;
    }

    if (!["image/jpeg", "image/png", "image/webp"].includes(file.type)) {
        resultMessage.textContent = "JPEG、PNG、WebP の写真を選択してください。";
        return;
    }

    if (file.size > 8 * 1024 * 1024) {
        resultMessage.textContent = "写真サイズは8MB以下にしてください。";
        return;
    }

    resultMessage.textContent = "送信中です...";

    try {
        const base64 = await fileToBase64(file);

        const payload = {
            name: document.getElementById("name").value,
            comment: document.getElementById("comment").value,
            fileName: file.name,
            mimeType: file.type,
            base64: base64
        };

        const response = await fetch("/api/photo", {
            method: "POST",
            headers: {
                "content-type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        resultMessage.textContent = data.message;

        if (data.ok) {
            form.reset();
        }

    } catch (error) {
        resultMessage.textContent = "通信に失敗しました。";
    }
});

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
            const result = String(reader.result);
            const base64 = result.split(",")[1] || "";
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}
</script>

</body>
</html>
