<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真投稿</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <h1>写真投稿</h1>

    <p class="subtitle">
        送別会の写真を投稿してください
    </p>

    <form id="photoForm" class="form-area">

        <label class="form-label" for="name">
            お名前・ニックネーム 任意
        </label>
        <input type="text" id="name" class="input" maxlength="30" placeholder="匿名でもOK">

        <label class="form-label" for="comment">
            コメント 任意
        </label>
        <textarea id="comment" class="textarea small-textarea" maxlength="200" placeholder="写真への一言"></textarea>

        <label class="form-label" for="photo">
            写真
        </label>
        <input type="file" id="photo" class="input" accept="image/jpeg,image/png,image/webp" required>

        <button type="submit" class="button button-submit">
            写真を投稿する
        </button>

    </form>

    <p id="resultMessage" class="result-message"></p>

    <a id="backLink" class="button button-secondary" href="index.html">
        戻る
    </a>

</div>

<script>
const form = document.getElementById("photoForm");
const resultMessage = document.getElementById("resultMessage");
const submitButton = form.querySelector("button[type='submit']");

const params = new URLSearchParams(window.location.search);
const recipientId = params.get("id") || "";
const backLink = document.getElementById("backLink");

if (recipientId) {
    backLink.href = `person.html?id=${encodeURIComponent(recipientId)}`;
} else {
    backLink.href = "index.html";
}

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const file = document.getElementById("photo").files[0];

    if (!file) {
        showMessage("写真を選択してください。", false);
        return;
    }

    if (!["image/jpeg", "image/png", "image/webp"].includes(file.type)) {
        showMessage("JPEG、PNG、WebP の写真を選択してください。", false);
        return;
    }


    setLoading(true);
    showMessage("写真を送信中です。少しお待ちください...", true);

    try {
        const compressedFile =
            await compressImage(file);

        const base64 =
            await fileToBase64(compressedFile);

        if (!recipientId) {
            showMessage(
                "送別者が指定されていません。",
                false
            );
            return;
        }

        const payload = {
            recipient_id: recipientId,
            name: document.getElementById("name").value,
            comment: document.getElementById("comment").value,
            fileName: compressedFile.name,
            mimeType: compressedFile.type,
            base64: base64
        };

        const response = await fetch("/api/photo", {
            method: "POST",
            headers: {
                "content-type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        let data;
        try {
            data = await response.json();
        } catch (error) {
            data = { ok: false, message: "サーバー応答を確認できませんでした。" };
        }

        if (response.ok && data.ok) {
            showMessage("✅ 写真を投稿しました。ありがとうございました！", true);
            form.reset();
        } else {
            showMessage(data.message || "写真投稿に失敗しました。", false);
        }

    } catch (error) {
        showMessage("通信に失敗しました。時間をおいて再度お試しください。", false);
    } finally {
        setLoading(false);
    }
});

function setLoading(isLoading) {
    submitButton.disabled = isLoading;
    submitButton.textContent = isLoading ? "送信中..." : "写真を投稿する";
}

function showMessage(message, isSuccess) {
    resultMessage.textContent = message;
    resultMessage.classList.toggle("success-message", isSuccess);
    resultMessage.classList.toggle("error-message", !isSuccess);
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
            const result = String(reader.result);
            const base64 = result.split(",")[1] || "";
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

async function compressImage(file) {

    if (file.size <= 8 * 1024 * 1024) {
        return file;
    }

    return new Promise((resolve, reject) => {

        const image = new Image();
        const reader = new FileReader();

        reader.onload = event => {

            image.onload = () => {

                let width = image.width;
                let height = image.height;

                const maxSize = 1600;

                if (width > height) {

                    if (width > maxSize) {
                        height =
                            Math.round(
                                height * maxSize / width
                            );

                        width = maxSize;
                    }

                } else {

                    if (height > maxSize) {
                        width =
                            Math.round(
                                width * maxSize / height
                            );

                        height = maxSize;
                    }
                }

                const canvas =
                    document.createElement("canvas");

                canvas.width = width;
                canvas.height = height;

                const ctx =
                    canvas.getContext("2d");

                ctx.drawImage(
                    image,
                    0,
                    0,
                    width,
                    height
                );

                let quality = 0.9;

                const createBlob = () => {

                    canvas.toBlob(blob => {

                        if (!blob) {
                            reject(
                                new Error("圧縮失敗")
                            );
                            return;
                        }

                        if (
                            blob.size <=
                            8 * 1024 * 1024
                        ) {

                            resolve(
                                new File(
                                    [blob],
                                    file.name,
                                    {
                                        type:"image/jpeg"
                                    }
                                )
                            );

                            return;
                        }

                        quality -= 0.1;

                        if (quality < 0.4) {

                            resolve(
                                new File(
                                    [blob],
                                    file.name,
                                    {
                                        type:"image/jpeg"
                                    }
                                )
                            );

                            return;
                        }

                        createBlob();

                    }, "image/jpeg", quality);

                };

                createBlob();

            };

            image.onerror = reject;
            image.src = event.target.result;

        };

        reader.onerror = reject;
        reader.readAsDataURL(file);

    });

}

</script>

</body>
</html>
