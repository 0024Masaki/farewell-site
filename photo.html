<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真投稿</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-nav" data-site-nav>
    <a class="site-nav-home" href="/index.html" aria-label="TOPへ戻る" title="TOPへ戻る"><span aria-hidden="true">⌂</span></a>

    <button
        class="site-nav-toggle"
        type="button"
        aria-controls="siteNavMenu"
        aria-expanded="false"
        data-site-nav-toggle>
        <span class="site-nav-toggle-icon">☰</span>
        <span class="site-nav-toggle-text">メニュー</span>
    </button>

    <nav id="siteNavMenu" class="site-nav-links" data-site-nav-menu>
        <a href="/index.html">TOP</a>
        <a href="/summary.html">投稿まとめ</a>
        <a href="/admin/index.html">管理者</a>
    </nav>
</header>


<div class="card">

    <h1>写真投稿</h1>

    <p class="subtitle">
        送別会の写真を投稿してください
    </p>

    <form id="photoForm" class="form-area">

        <label class="form-label" for="name">
            お名前・ニックネーム 任意
        </label>
        <input type="text" id="name" class="input" maxlength="30" placeholder="匿名でもOK">

        <label class="form-label" for="comment">
            コメント 任意
        </label>
        <textarea id="comment" class="textarea small-textarea" maxlength="200" placeholder="写真への一言"></textarea>

        <label class="form-label" for="photo">
            写真
        </label>

        <p class="input-help-text">
            複数枚まとめて選択できます。最大20枚まで投稿できます。
        </p>

        <input
            type="file"
            id="photo"
            class="input"
            accept="image/jpeg,image/png,image/webp"
            multiple
            required
        >

        <button type="submit" class="button button-submit">
            写真を投稿する
        </button>

    </form>

    <p id="resultMessage" class="result-message"></p>

    <a id="backLink" class="button button-secondary" href="index.html">
        戻る
    </a>

</div>

<script>
const form = document.getElementById("photoForm");
const resultMessage = document.getElementById("resultMessage");
const submitButton = form.querySelector("button[type='submit']");

const photoInput = document.getElementById("photo");
const maxUploadFiles = 20;
const maxOriginalPhotoBytes = 30 * 1024 * 1024;
const maxCompressedPhotoBytes = 1400 * 1024;
const photoResizeMaxSize = 1280;
const photoJpegQuality = 0.82;
const photoMinJpegQuality = 0.55;

const params = new URLSearchParams(window.location.search);
const recipientId = params.get("id") || "";
const backLink = document.getElementById("backLink");

if (recipientId) {
    backLink.href = `person.html?id=${encodeURIComponent(recipientId)}`;
} else {
    backLink.href = "index.html";
}

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    if (!recipientId) {
        showMessage(
            "送別者が指定されていません。",
            false
        );
        return;
    }

    const files =
        [...photoInput.files];

    if (files.length === 0) {
        showMessage("写真を選択してください。", false);
        return;
    }

    if (files.length > maxUploadFiles) {
        showMessage(
            `一度に投稿できる写真は${maxUploadFiles}枚までです。`,
            false
        );
        return;
    }

    const fileError = getPhotoFileError(files);

    if (fileError) {
        showMessage(fileError, false);
        return;
    }

    setLoading(true);

    let successCount = 0;
    const failedMessages = [];

    try {

        for (let index = 0; index < files.length; index++) {
            const file = files[index];

            showMessage(
                `${index + 1}/${files.length}枚目を送信中です...`,
                true
            );

            try {
                const compressedFile =
                    await compressImage(file);

                const base64 =
                    await fileToBase64(compressedFile);

                const payload = {
                    recipient_id: recipientId,
                    name: document.getElementById("name").value,
                    comment: document.getElementById("comment").value,
                    fileName: compressedFile.name,
                    mimeType: compressedFile.type,
                    base64: base64
                };

                const response = await fetch("/api/photo", {
                    method: "POST",
                    headers: {
                        "content-type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                let data;

                try {
                    data = await response.json();
                } catch (error) {
                    data = {
                        ok: false,
                        message: "サーバー応答を確認できませんでした。"
                    };
                }

                if (response.ok && data.ok) {
                    successCount++;
                } else {
                    failedMessages.push(
                        `${file.name}：${data.message || "投稿に失敗しました。"}`
                    );
                }

                await sleep(250);

            } catch (error) {
                failedMessages.push(
                    `${file.name}：${error && error.message ? error.message : "投稿処理に失敗しました。"}`
                );
            }
        }

        if (successCount > 0 && failedMessages.length === 0) {
            showMessage(
                `✅ ${successCount}枚の写真を投稿しました。ありがとうございました！`,
                true
            );
            form.reset();
            return;
        }

        if (successCount > 0) {
            showMessage(
                `✅ ${successCount}枚投稿しました。一部失敗があります：${failedMessages.join(" / ")}`,
                false
            );
            return;
        }

        showMessage(
            `写真投稿に失敗しました：${failedMessages.join(" / ")}`,
            false
        );

    } catch (error) {
        showMessage(
            "通信に失敗しました。時間をおいて再度お試しください。",
            false
        );
    } finally {
        setLoading(false);
    }
});

function setLoading(isLoading) {
    submitButton.disabled = isLoading;
    submitButton.textContent = isLoading ? "送信中..." : "写真を投稿する";
}

function showMessage(message, isSuccess) {
    resultMessage.textContent = message;
    resultMessage.classList.toggle("success-message", isSuccess);
    resultMessage.classList.toggle("error-message", !isSuccess);
}

function sleep(milliseconds) {
    return new Promise(resolve => {
        setTimeout(resolve, milliseconds);
    });
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (file.size > maxCompressedPhotoBytes) {
            reject(
                new Error(
                    `写真サイズが大きすぎます。${getReadableFileSize(maxCompressedPhotoBytes)}以下の写真にしてください。`
                )
            );
            return;
        }

        const reader = new FileReader();

        reader.onload = () => {
            const result = String(reader.result);
            const base64 = result.split(",")[1] || "";
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error || new Error("写真を読み込めませんでした。"));
        reader.readAsDataURL(file);
    });
}

async function compressImage(file) {
    let loadedImage = null;

    try {
        loadedImage = await loadImageFromFile(file);

        const image = loadedImage.image;
        const originalWidth = Number(image.naturalWidth || image.width || 0);
        const originalHeight = Number(image.naturalHeight || image.height || 0);

        if (!originalWidth || !originalHeight) {
            throw new Error("写真サイズを確認できませんでした。");
        }

        const scale = Math.min(
            1,
            photoResizeMaxSize / Math.max(originalWidth, originalHeight)
        );

        const width = Math.max(1, Math.round(originalWidth * scale));
        const height = Math.max(1, Math.round(originalHeight * scale));

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d", { alpha: false });

        if (!ctx) {
            throw new Error("写真の変換に失敗しました。");
        }

        ctx.drawImage(image, 0, 0, width, height);

        let quality = photoJpegQuality;
        let blob = await canvasToBlob(canvas, quality);

        while (blob.size > maxCompressedPhotoBytes && quality > photoMinJpegQuality) {
            quality = Math.max(photoMinJpegQuality, quality - 0.08);
            blob = await canvasToBlob(canvas, quality);
        }

        canvas.width = 1;
        canvas.height = 1;

        if (blob.size > maxCompressedPhotoBytes) {
            throw new Error(
                `写真サイズが大きすぎます。${getReadableFileSize(maxOriginalPhotoBytes)}以下の別写真を選択してください。`
            );
        }

        return new File([blob], changeExtensionToJpeg(file.name), {
            type: "image/jpeg"
        });

    } finally {
        if (loadedImage) {
            URL.revokeObjectURL(loadedImage.objectUrl);
        }
    }
}

function getPhotoFileError(files) {
    for (const file of files) {
        const message = getImageFileError(file);

        if (message) {
            return `${file.name}：${message}`;
        }
    }

    return "";
}

function getImageFileError(file) {
    if (!file) {
        return "写真を選択してください。";
    }

    if (!["image/jpeg", "image/png", "image/webp"].includes(file.type)) {
        return "JPEG、PNG、WebP の写真を選択してください。";
    }

    if (file.size > maxOriginalPhotoBytes) {
        return `写真サイズが大きすぎます。${getReadableFileSize(maxOriginalPhotoBytes)}以下の写真を選択してください。`;
    }

    return "";
}

function loadImageFromFile(file) {
    return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(file);
        const image = new Image();

        image.onload = () => {
            resolve({
                image,
                objectUrl
            });
        };

        image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("写真を読み込めませんでした。"));
        };

        image.src = objectUrl;
    });
}

function canvasToBlob(canvas, quality) {
    return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
            if (!blob) {
                reject(new Error("写真の圧縮に失敗しました。"));
                return;
            }

            resolve(blob);
        }, "image/jpeg", quality);
    });
}

function changeExtensionToJpeg(fileName) {
    const baseName = String(fileName || "photo")
        .replace(/\.[^.]*$/, "")
        .trim();

    return `${baseName || "photo"}.jpg`;
}

function getReadableFileSize(bytes) {
    return `${Math.round(bytes / 1024 / 1024 * 10) / 10}MB`;
}

</script>

<script src="/site_nav.js" defer></script>
</body>
</html>
