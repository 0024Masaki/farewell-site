<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メッセージ投稿</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-nav" data-site-nav>
    <a class="site-nav-home" href="/index.html" aria-label="TOPへ戻る" title="TOPへ戻る"><span aria-hidden="true">⌂</span></a>

    <button
        class="site-nav-toggle"
        type="button"
        aria-controls="siteNavMenu"
        aria-expanded="false"
        data-site-nav-toggle>
        <span class="site-nav-toggle-icon">☰</span>
        <span class="site-nav-toggle-text">メニュー</span>
    </button>

    <nav id="siteNavMenu" class="site-nav-links" data-site-nav-menu>
        <a href="/index.html">TOP</a>
        <a href="/summary.html">投稿まとめ</a>
        <a href="/admin/index.html">管理者</a>
    </nav>
</header>


<div class="card">

    <h1>メッセージ投稿</h1>

    <p class="subtitle">
        一言メッセージをお寄せください
    </p>

    <form id="messageForm" class="form-area">

        <label class="form-label" for="name">
            お名前・ニックネーム 任意
        </label>
        <input type="text" id="name" class="input" maxlength="30" placeholder="匿名でもOK" autocomplete="off">

        <label class="form-label" for="message">
            メッセージ
        </label>
        <textarea id="message" class="textarea" maxlength="300" placeholder="お疲れ様でした！" required></textarea>

        <button type="submit" class="button button-submit">
            投稿する
        </button>

    </form>

    <p id="resultMessage" class="result-message"></p>

    <a id="backLink" class="button button-secondary" href="index.html">
        戻る
    </a>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const recipientId = params.get("id") || "person1";

const form = document.getElementById("messageForm");
const resultMessage = document.getElementById("resultMessage");
const backLink = document.getElementById("backLink");

backLink.href = `person.html?id=${encodeURIComponent(recipientId)}`;

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    resultMessage.textContent = "送信中です...";

    const payload = {
        recipient_id: recipientId,
        name: document.getElementById("name").value,
        message: document.getElementById("message").value
    };

    try {
        const response = await fetch("/api/message", {
            method: "POST",
            headers: {
                "content-type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        resultMessage.textContent = data.message;

        if (data.ok) {
            form.reset();
        }

    } catch (error) {
        resultMessage.textContent = "通信に失敗しました。";
    }
});
</script>

<script src="/site_nav.js" defer></script>
</body>
</html>
