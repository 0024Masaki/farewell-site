<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第３部送別記念サイト</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <div id="siteHeroSlider" class="site-hero-slider">
            <div id="siteHeroTrack" class="site-hero-track"></div>
        </div>

        <h1 id="siteTitle">第３部送別記念サイト</h1>

        <p id="siteSubtitle" class="subtitle">
            皆様からの写真やメッセージをお待ちしております
        </p>
        <section id="venueNotice" class="venue-notice" hidden>
            <h2 id="venueNoticeTitle"></h2>

            <div class="venue-info">
                <p id="venueDateRow" hidden>
                    <span>日時</span>
                    <b id="venueDate"></b>
                </p>

                <p id="venueNameRow" hidden>
                    <span>会場</span>
                    <b id="venueName"></b>
                </p>

                <p id="venueAddressRow" hidden>
                    <span>住所</span>
                    <b id="venueAddress"></b>
                </p>
            </div>

            <p id="venueNoticeText" class="venue-notice-text" hidden></p>

            <div class="venue-button-row">
                <a id="venueMapLink" class="button venue-map-button" target="_blank" rel="noopener noreferrer" hidden>
                    会場をGoogleマップで開く
                </a>


            </div>
        </section>

        <div id="recipientList"></div>
        <footer>
            <a href="admin/index.html">
                管理者ページ
            </a>
        </footer>
        <div class="qr-section">
            <p class="qr-title">スマホで開く</p>

            <img class="site-qr" src="/images/farewell_site_qr.png" alt="送別会ページQRコード">

            <p class="qr-note">
                QRコードを読み取ると、このページを開けます、サイトのリンクがわからない方に見せてあげてください。
            </p>
        </div>
    </div>



    <script>
        let heroScrollerTimerId = null;
        let heroScrollerResumeTimerId = null;
        let heroScrollEndTimerId = null;
        let heroScrollerLoopWidth = 0;
        let heroScrollerSlider = null;
        let heroScrollerTrack = null;
        let heroScrollerOriginalPhotoCount = 0;
        let heroUserScrolling = false;

        async function loadHeroPhotos() {
            const slider = document.getElementById("siteHeroSlider");
            const track = document.getElementById("siteHeroTrack");

            setupHeroNativeFlick(slider, track);

            try {
                const response = await fetch(
                    `/api/site_hero_photos?t=${Date.now()}`,
                    {
                        cache: "no-store"
                    }
                );

                const data = await response.json();

                if (!data.ok || !data.photos || data.photos.length === 0) {
                    renderHeroFallback(slider, track);
                    return;
                }

                renderHeroSlider(slider, track, data.photos);

            } catch (error) {
                renderHeroFallback(slider, track);
            }
        }

        function renderHeroFallback(slider, track) {
            stopHeroScroller();

            slider.classList.add("is-static");
            slider.scrollLeft = 0;

            track.innerHTML = "";

            const image = document.createElement("img");
            image.className = "site-hero-photo";
            image.src = `/images/site-hero.jpg?t=${Date.now()}`;
            image.alt = "送別会";

            track.appendChild(image);
        }

        function renderHeroSlider(slider, track, photos) {
            stopHeroScroller();

            slider.classList.remove("is-static");
            slider.scrollLeft = 0;
            track.innerHTML = "";

            const safePhotos =
                photos.filter(photo =>
                    /^https:\/\/[^\s"'<>]+$/i.test(String(photo.image_url || ""))
                );

            if (safePhotos.length === 0) {
                renderHeroFallback(slider, track);
                return;
            }

            if (safePhotos.length === 1) {
                slider.classList.add("is-static");

                const image = createHeroImage(safePhotos[0]);
                track.appendChild(image);
                return;
            }

            const loopPhotos = [];

            /*
                3周以上並べる。
                iPhoneのネイティブ横スクロールで触れるようにする。
            */
            while (
                loopPhotos.length < safePhotos.length * 3 ||
                loopPhotos.length < 12
            ) {
                safePhotos.forEach(photo => {
                    loopPhotos.push(photo);
                });
            }

            loopPhotos.forEach(photo => {
                const image = createHeroImage(photo);
                track.appendChild(image);
            });

            waitForHeroImages(track)
                .then(() => {
                    setTimeout(() => {
                        startHeroScroller(
                            slider,
                            track,
                            safePhotos.length,
                            false
                        );
                    }, 300);
                });
        }

        function createHeroImage(photo) {
            const image = document.createElement("img");
            image.className = "site-hero-photo";
            image.src = photo.image_url;
            image.alt = "送別会写真";
            image.loading = "eager";
            image.decoding = "async";
            return image;
        }

        function waitForHeroImages(track) {
            const images =
                [...track.querySelectorAll("img")];

            const waits =
                images.map(image => {
                    if (image.complete) {
                        return Promise.resolve();
                    }

                    return new Promise(resolve => {
                        image.addEventListener("load", resolve, { once: true });
                        image.addEventListener("error", resolve, { once: true });
                    });
                });

            return Promise.all(waits);
        }

        function startHeroScroller(
            slider,
            track,
            originalPhotoCount,
            keepPosition
        ) {
            pauseHeroScroller();

            heroScrollerSlider = slider;
            heroScrollerTrack = track;
            heroScrollerOriginalPhotoCount = originalPhotoCount;

            heroScrollerLoopWidth =
                calculateHeroLoopWidth(track, originalPhotoCount);

            if (heroScrollerLoopWidth <= 1) {
                return;
            }

            /*
                3周並んでいるうち、真ん中の周から開始する。
                左右どちらにフリックしても余裕を持たせる。
            */
            if (!keepPosition) {
                slider.scrollLeft = heroScrollerLoopWidth;
            }

            normalizeHeroScrollPosition(slider);

            const speed = 2;

            heroScrollerTimerId = setInterval(() => {
                if (heroUserScrolling) {
                    return;
                }

                slider.scrollLeft += speed;

                normalizeHeroScrollPosition(slider);

            }, 30);
        }

        function pauseHeroScroller() {
            if (heroScrollerTimerId) {
                clearInterval(heroScrollerTimerId);
                heroScrollerTimerId = null;
            }
        }

        function stopHeroScroller() {
            pauseHeroScroller();

            if (heroScrollerResumeTimerId) {
                clearTimeout(heroScrollerResumeTimerId);
                heroScrollerResumeTimerId = null;
            }

            if (heroScrollEndTimerId) {
                clearTimeout(heroScrollEndTimerId);
                heroScrollEndTimerId = null;
            }

            heroScrollerLoopWidth = 0;
            heroScrollerSlider = null;
            heroScrollerTrack = null;
            heroScrollerOriginalPhotoCount = 0;
            heroUserScrolling = false;
        }

        function setupHeroNativeFlick(slider, track) {
            if (slider.dataset.heroNativeFlickReady === "1") {
                return;
            }

            slider.dataset.heroNativeFlickReady = "1";

            const beginManualScroll = () => {
                if (heroScrollerLoopWidth <= 1) {
                    return;
                }

                heroUserScrolling = true;
                pauseHeroScroller();

                if (heroScrollerResumeTimerId) {
                    clearTimeout(heroScrollerResumeTimerId);
                    heroScrollerResumeTimerId = null;
                }

                if (heroScrollEndTimerId) {
                    clearTimeout(heroScrollEndTimerId);
                    heroScrollEndTimerId = null;
                }
            };

            const endManualScroll = () => {
                if (heroScrollerLoopWidth <= 1) {
                    return;
                }

                if (heroScrollEndTimerId) {
                    clearTimeout(heroScrollEndTimerId);
                }

                heroScrollEndTimerId = setTimeout(() => {
                    heroUserScrolling = false;

                    startHeroScroller(
                        slider,
                        track,
                        heroScrollerOriginalPhotoCount,
                        true
                    );

                }, 1200);
            };

            /*
                scrollイベントでは停止しない。
                ここではループ位置の補正だけ行う。
            */
            slider.addEventListener("scroll", () => {
                normalizeHeroScrollPosition(slider);
            }, {
                passive: true
            });

            /*
                iPhone / iPad
            */
            slider.addEventListener("touchstart", beginManualScroll, {
                passive: true
            });

            slider.addEventListener("touchend", endManualScroll, {
                passive: true
            });

            slider.addEventListener("touchcancel", endManualScroll, {
                passive: true
            });

            /*
                PC
            */
            slider.addEventListener("mousedown", beginManualScroll);

            window.addEventListener("mouseup", endManualScroll);
        }

        function normalizeHeroScrollPosition(slider) {
            if (heroScrollerLoopWidth <= 1) {
                return;
            }

            /*
                3周分のうち、真ん中周辺に戻す。
                見た目は同じ写真列なので、ジャンプしても分からない。
            */
            if (slider.scrollLeft < heroScrollerLoopWidth * 0.45) {
                slider.scrollLeft += heroScrollerLoopWidth;
                return;
            }

            if (slider.scrollLeft > heroScrollerLoopWidth * 1.55) {
                slider.scrollLeft -= heroScrollerLoopWidth;
            }
        }

        function calculateHeroLoopWidth(track, originalPhotoCount) {
            const photos =
                [...track.querySelectorAll(".site-hero-photo")]
                    .slice(0, originalPhotoCount);

            if (photos.length === 0) {
                return 0;
            }

            const style =
                window.getComputedStyle(track);

            const gap =
                parseFloat(style.columnGap || style.gap || "0") || 0;

            let width = 0;

            photos.forEach(photo => {
                width += photo.getBoundingClientRect().width;
            });

            width += gap * photos.length;

            return Math.max(1, width);
        }

        async function loadSiteNotice() {
            const siteTitle = document.getElementById("siteTitle");
            const siteSubtitle = document.getElementById("siteSubtitle");
            const venueNotice = document.getElementById("venueNotice");
            const venueNoticeTitle = document.getElementById("venueNoticeTitle");
            const venueDateRow = document.getElementById("venueDateRow");
            const venueDate = document.getElementById("venueDate");
            const venueNameRow = document.getElementById("venueNameRow");
            const venueName = document.getElementById("venueName");
            const venueAddressRow = document.getElementById("venueAddressRow");
            const venueAddress = document.getElementById("venueAddress");
            const venueNoticeText = document.getElementById("venueNoticeText");
            const venueMapLink = document.getElementById("venueMapLink");


            try {
                const response = await fetch("/api/site_notice");
                const data = await response.json();

                if (!data.ok || !data.notice) {
                    venueNotice.hidden = true;
                    return;
                }

                const notice = data.notice;

                siteTitle.textContent = notice.site_title || "第３部送別記念サイト";
                siteSubtitle.textContent = notice.site_subtitle || "皆様からの写真やメッセージをお待ちしております";

                venueNoticeTitle.textContent =
                    notice.notice_title || "宴会場のお知らせ";

                setNoticeRow(
                    venueDateRow,
                    venueDate,
                    notice.event_datetime
                );

                setNoticeRow(
                    venueNameRow,
                    venueName,
                    notice.venue_name
                );

                setNoticeRow(
                    venueAddressRow,
                    venueAddress,
                    notice.venue_address
                );

                setNoticeText(
                    venueNoticeText,
                    notice.notice_text
                );

                setNoticeLink(
                    venueMapLink,
                    notice.map_url
                );

                venueNotice.hidden = false;

            } catch (error) {
                venueNotice.hidden = true;
            }
        }

        function setNoticeRow(rowElement, valueElement, value) {
            const text = String(value || "").trim();

            if (!text) {
                rowElement.hidden = true;
                valueElement.textContent = "";
                return;
            }

            valueElement.textContent = text;
            rowElement.hidden = false;
        }

        function setNoticeText(element, value) {
            const text = String(value || "").trim();

            if (!text) {
                element.hidden = true;
                element.textContent = "";
                return;
            }

            element.textContent = text;
            element.hidden = false;
        }

        function setNoticeLink(element, value) {
            const url = String(value || "").trim();

            if (!/^https:\/\/[^\s"'<>]+$/i.test(url)) {
                element.hidden = true;
                element.removeAttribute("href");
                return;
            }

            element.href = url;
            element.hidden = false;
        }

        async function loadRecipients() {

            const list =
                document.getElementById(
                    "recipientList"
                );

            list.innerHTML =
                "<p>読み込み中...</p>";

            try {

                const response =
                    await fetch(
                        "/api/recipients"
                    );

                const data =
                    await response.json();

                if (!data.ok) {

                    list.innerHTML =
                        "<p>送別者情報を取得できませんでした。</p>";

                    return;
                }

                list.innerHTML = "";

                data.recipients.forEach(
                    recipient => {

                        const card = document.createElement("div");
                        card.className = "recipient-card";

                        const avatar = createRecipientAvatar(recipient);

                        const content = document.createElement("div");
                        content.className = "recipient-content";

                        const name = document.createElement("h2");
                        name.textContent = recipient.name || "";

                        const title = document.createElement("p");
                        title.textContent = recipient.title || "";

                        const link = document.createElement("a");
                        link.className = "button";
                        link.href = `person.html?id=${encodeURIComponent(recipient.id)}`;
                        link.textContent = "この方のページを見る";

                        content.appendChild(name);
                        content.appendChild(title);

                        card.appendChild(avatar);
                        card.appendChild(content);
                        card.appendChild(link);
                        list.appendChild(card);

                    }
                );

            } catch (error) {

                list.innerHTML =
                    "<p>通信エラーが発生しました。</p>";

            }

        }


        function createRecipientAvatar(recipient) {

            const avatar =
                document.createElement("div");

            avatar.className =
                "recipient-avatar";

            const imageUrl =
                recipient.photo_url ||
                recipient.image_url ||
                recipient.avatar_url ||
                "";

            if (imageUrl) {

                const image =
                    document.createElement("img");

                image.src = imageUrl;
                image.alt = recipient.name || "送別者";

                avatar.appendChild(image);
                return avatar;

            }

            const name =
                recipient.name || "送";

            avatar.textContent =
                name.trim().slice(0, 1) || "送";

            return avatar;

        }

        loadHeroPhotos();
        loadSiteNotice();
        loadRecipients();

    </script>

</body>

</html>
