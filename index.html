<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第３部送別記念サイト</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="site-hero-image">
        <img src="/images/site-hero.jpg" alt="送別会">
    </div>

    <h1>第３部送別記念サイト</h1>

    <p class="subtitle">
        皆様からの写真やメッセージをお待ちしております
    </p>

    <div id="recipientList"></div>
    <footer>
        <a href="admin/index.html">
            管理者ページ
        </a>
    </footer>
</div>



<script>

async function loadRecipients() {

    const list =
        document.getElementById(
            "recipientList"
        );

    list.innerHTML =
        "<p>読み込み中...</p>";

    try {

        const response =
            await fetch(
                "/api/recipients"
            );

        const data =
            await response.json();

        if (!data.ok) {

            list.innerHTML =
                "<p>送別者情報を取得できませんでした。</p>";

            return;
        }

        list.innerHTML = "";

        data.recipients.forEach(
            recipient => {

                const card = document.createElement("div");
                card.className = "recipient-card";

                const avatar = createRecipientAvatar(recipient);

                const content = document.createElement("div");
                content.className = "recipient-content";

                const name = document.createElement("h2");
                name.textContent = recipient.name || "";

                const title = document.createElement("p");
                title.textContent = recipient.title || "";

                const link = document.createElement("a");
                link.className = "button";
                link.href = `person.html?id=${encodeURIComponent(recipient.id)}`;
                link.textContent = "この方のページを見る";

                content.appendChild(name);
                content.appendChild(title);

                card.appendChild(avatar);
                card.appendChild(content);
                card.appendChild(link);
                list.appendChild(card);

            }
        );

    } catch (error) {

        list.innerHTML =
            "<p>通信エラーが発生しました。</p>";

    }

}


function createRecipientAvatar(recipient) {

    const avatar =
        document.createElement("div");

    avatar.className =
        "recipient-avatar";

    const imageUrl =
        recipient.photo_url ||
        recipient.image_url ||
        recipient.avatar_url ||
        "";

    if (imageUrl) {

        const image =
            document.createElement("img");

        image.src = imageUrl;
        image.alt = recipient.name || "送別者";

        avatar.appendChild(image);
        return avatar;

    }

    const name =
        recipient.name || "送";

    avatar.textContent =
        name.trim().slice(0, 1) || "送";

    return avatar;

}

loadRecipients();

</script>

</body>
</html>
