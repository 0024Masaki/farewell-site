<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送別記念サイト</title>

<style>
body{
    background:#f5f7fa;
    font-family:sans-serif;
    text-align:center;
    padding:50px;
}

.card{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.button{
    display:block;
    margin:15px auto;
    padding:15px;
    background:#4f46e5;
    color:white;
    text-decoration:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h1>送別記念サイト</h1>

<p>
皆様からの写真やメッセージをお待ちしております
</p>

<a class="button" href="#">
写真を投稿
</a>

<a class="button" href="#">
メッセージを投稿
</a>

</div>

</body>
</html>
