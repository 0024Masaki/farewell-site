<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送別記念サイト</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="hero-icon">🎉</div>

    <h1>送別記念サイト</h1>

    <p class="subtitle">
        皆様からの写真やメッセージをお待ちしております
    </p>

    <div id="recipientList"></div>

    <a class="button" href="admin/messages.html">
        管理者ページへ
    </a>

</div>

<script>

async function loadRecipients() {

    const list =
        document.getElementById(
            "recipientList"
        );

    list.innerHTML =
        "<p>読み込み中...</p>";

    try {

        const response =
            await fetch(
                "/api/recipients"
            );

        const data =
            await response.json();

        if (!data.ok) {

            list.innerHTML =
                "<p>送別者情報を取得できませんでした。</p>";

            return;
        }

        list.innerHTML = "";

        data.recipients.forEach(
            recipient => {

                list.insertAdjacentHTML(
                    "beforeend",
                    `
                    <div class="recipient-card">

                        <h2>
                            ${recipient.name}
                        </h2>

                        <p>
                            ${recipient.title || ""}
                        </p>

                        <a
                          class="button"
                          href="person.html?id=${recipient.id}">
                          この方のページを見る
                        </a>

                    </div>
                    `
                );

            }
        );

    } catch (error) {

        list.innerHTML =
            "<p>通信エラーが発生しました。</p>";

    }

}

loadRecipients();

</script>

</body>
</html>
