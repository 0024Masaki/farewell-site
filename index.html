<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送別記念サイト</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="hero-icon">🎉</div>

    <h1>送別記念サイト</h1>

    <p class="subtitle">
        皆様からの写真やメッセージをお待ちしております
    </p>

    <div id="recipientList"></div>

</div>

<footer>
    <a href="admin/index.html">
        管理者ページ
    </a>
</footer>

<script>

async function loadRecipients() {

    const list =
        document.getElementById(
            "recipientList"
        );

    list.innerHTML =
        "<p>読み込み中...</p>";

    try {

        const response =
            await fetch(
                "/api/recipients"
            );

        const data =
            await response.json();

        if (!data.ok) {

            list.innerHTML =
                "<p>送別者情報を取得できませんでした。</p>";

            return;
        }

        list.innerHTML = "";

        data.recipients.forEach(
            recipient => {

                const card = document.createElement("div");
                card.className = "recipient-card";

                const name = document.createElement("h2");
                name.textContent = recipient.name || "";

                const title = document.createElement("p");
                title.textContent = recipient.title || "";

                const link = document.createElement("a");
                link.className = "button";
                link.href = `person.html?id=${encodeURIComponent(recipient.id)}`;
                link.textContent = "この方のページを見る";

                card.appendChild(name);
                card.appendChild(title);
                card.appendChild(link);
                list.appendChild(card);

            }
        );

    } catch (error) {

        list.innerHTML =
            "<p>通信エラーが発生しました。</p>";

    }

}

loadRecipients();

</script>

</body>
</html>
