<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送別者ページ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-nav" data-site-nav>
    <a class="site-nav-brand" href="/index.html">記念サイト</a>

    <button
        class="site-nav-toggle"
        type="button"
        aria-controls="siteNavMenu"
        aria-expanded="false"
        data-site-nav-toggle>
        <span class="site-nav-toggle-icon">☰</span>
        <span class="site-nav-toggle-text">メニュー</span>
    </button>

    <nav id="siteNavMenu" class="site-nav-links" data-site-nav-menu>
        <a href="/index.html">TOP</a>
        <a href="/summary.html">投稿まとめ</a>
        <a href="/admin/index.html">管理者</a>
    </nav>
</header>


<div class="card wide-card">

    <div id="personAvatar" class="person-avatar" hidden>
        <img id="personAvatarImage" alt="送別者の写真">
    </div>

    <h1 id="recipientName">読み込み中...</h1>

    <p id="recipientTitle" class="subtitle"></p>

    <section class="profile-section">
        <h2>紹介文</h2>
        <div id="profileBody" class="profile-body">
            読み込み中...
        </div>
    </section>

    <section
        id="printPhotoSection"
        class="profile-section"
        hidden>

        <h2>投稿写真</h2>

        <div
            id="printPhotoGrid"
            class="print-photo-grid">

        </div>

    </section>

    <div class="person-menu">
        
        <a id="messageLink" class="button" href="#">
            メッセージを投稿
        </a>

        <a id="photoLink" class="button" href="#">
            写真を投稿
        </a>

        <a id="messageListLink" class="button button-secondary" href="#">
            メッセージを見る
        </a>

        <a id="galleryLink" class="button button-secondary" href="#">
            写真を見る
        </a>
        <button
            id="pdfButton"
            class="button button-submit"
            type="button">

            PDFで出力

        </button>
        <p class="pdf-help-text">
            ボタンを押すと印刷画面が開きます。ファイルに保存かPDFとして保存を選んでください。
        </p>
        <a class="button button-secondary" href="index.html">
            トップへ戻る
        </a>

    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const recipientId = params.get("id") || "";

const recipientName = document.getElementById("recipientName");
const recipientTitle = document.getElementById("recipientTitle");
const profileBody = document.getElementById("profileBody");
const personAvatar = document.getElementById("personAvatar");
const personAvatarImage = document.getElementById("personAvatarImage");

const messageLink = document.getElementById("messageLink");
const photoLink = document.getElementById("photoLink");
const messageListLink = document.getElementById("messageListLink");
const galleryLink = document.getElementById("galleryLink");
const pdfButton =
    document.getElementById("pdfButton");

const printPhotoSection =
    document.getElementById("printPhotoSection");

const printPhotoGrid =
    document.getElementById("printPhotoGrid");

if (!recipientId) {
    recipientName.textContent = "送別者が指定されていません";
    profileBody.textContent = "トップページから送別者を選択してください。";
} else {
    loadRecipient();
}

async function loadRecipient() {
    try {
        const response = await fetch("/api/recipients");
        const data = await response.json();

        if (!data.ok) {
            showError("送別者情報を取得できませんでした。");
            return;
        }

        const recipient = data.recipients.find(
            item => item.id === recipientId
        );

        if (!recipient) {
            showError("指定された送別者が見つかりません。");
            return;
        }

        document.title = `${recipient.name} 送別記念ページ`;

        recipientName.textContent = recipient.name;
        recipientTitle.textContent = recipient.title || "";

        profileBody.innerHTML = sanitizeProfileHtml(
            (recipient.profile_html || "紹介文は準備中です。")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n")
                .replace(/\n/g, "<br>")
        );

        if (isSafeImageUrl(recipient.photo_url)) {
            personAvatarImage.src = recipient.photo_url;
            personAvatar.hidden = false;
        } else {
            personAvatar.hidden = true;
            personAvatarImage.removeAttribute("src");
        }

        messageLink.href = `message.html?id=${encodeURIComponent(recipient.id)}`;
        photoLink.href = `photo.html?id=${encodeURIComponent(recipient.id)}`;
        messageListLink.href = `messages.html?id=${encodeURIComponent(recipient.id)}`;
        galleryLink.href = `gallery.html?id=${encodeURIComponent(recipient.id)}`;

    } catch (error) {
        showError("通信エラーが発生しました。");
    }
}

function showError(message) {
    recipientName.textContent = "表示できません";
    recipientTitle.textContent = "";
    personAvatar.hidden = true;
    personAvatarImage.removeAttribute("src");
    profileBody.textContent = message;
}

function isSafeImageUrl(url) {
    return /^https:\/\/[^\s"'<>]+$/i.test(String(url || ""));
}

async function loadPrintPhotos() {

    if (printPhotoGrid.dataset.loaded === "1") {
        return;
    }

    try {

        const response =
            await fetch(
                `/api/photos?recipient_id=${encodeURIComponent(recipientId)}`
            );

        const data =
            await response.json();

        printPhotoGrid.innerHTML = "";

        if (
            !data.ok ||
            !data.photos ||
            data.photos.length === 0
        ) {
            printPhotoSection.hidden = true;
            printPhotoGrid.dataset.loaded = "1";
            return;
        }

        data.photos.forEach(photo => {

            if (!photo.drive_file_id) {
                return;
            }

            const imageUrl =
                `https://drive.google.com/thumbnail?id=${encodeURIComponent(photo.drive_file_id)}&sz=w1200`;

            const card =
                document.createElement("div");

            card.className =
                "print-photo-card";

            const image =
                document.createElement("img");

            image.src =
                imageUrl;

            image.alt =
                "投稿写真";

            image.loading =
                "eager";

            const name =
                document.createElement("div");

            name.className =
                "print-photo-name";

            name.textContent =
                photo.name || "匿名";

            const comment =
                document.createElement("div");

            comment.className =
                "print-photo-comment";

            comment.textContent =
                photo.comment || "";

            card.appendChild(image);
            card.appendChild(name);
            card.appendChild(comment);

            printPhotoGrid.appendChild(card);

        });

        printPhotoGrid.dataset.loaded = "1";
        printPhotoSection.hidden = printPhotoGrid.children.length === 0;

    } catch(error) {

        printPhotoSection.hidden = true;

    }

}

pdfButton.addEventListener(
    "click",
    async () => {

        pdfButton.disabled = true;
        pdfButton.textContent = "PDF準備中...";

        await loadPrintPhotos();
        await waitForPrintImages();

        pdfButton.disabled = false;
        pdfButton.textContent = "PDFで出力";

        window.print();

    }
);

window.addEventListener(
    "afterprint",
    () => {
        printPhotoSection.hidden = true;
    }
);

async function waitForPrintImages() {

    const images =
        [...document.querySelectorAll(
            "#printPhotoGrid img"
        )];

    await Promise.all(

        images.map(image => {

            if (image.complete) {
                return Promise.resolve();
            }

            return new Promise(resolve => {

                image.onload = resolve;
                image.onerror = resolve;

            });

        })

    );

}

function sanitizeProfileHtml(html) {
    const template = document.createElement("template");
    template.innerHTML = html;

    const allowedTags = [
        "P",
        "BR",
        "STRONG",
        "B",
        "EM",
        "I",
        "UL",
        "OL",
        "LI",
        "H2",
        "H3"
    ];

    const elements = template.content.querySelectorAll("*");

    elements.forEach(element => {
        if (!allowedTags.includes(element.tagName)) {
            element.replaceWith(
                document.createTextNode(element.textContent)
            );
            return;
        }

        [...element.attributes].forEach(attribute => {
            element.removeAttribute(attribute.name);
        });
    });

    return template.innerHTML;
}
</script>

<script src="/site_nav.js" defer></script>
</body>
</html>
