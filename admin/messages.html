<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿メッセージ一覧</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card wide-card">

    <h1>投稿メッセージ一覧</h1>

    <p class="subtitle">
        送別会で投稿されたメッセージ一覧です
    </p>

    <div class="admin-box">
        <label class="form-label" for="adminKey">
            管理用パスキー
        </label>

        <input
            type="password"
            id="adminKey"
            class="input"
            placeholder="管理用パスキーを入力"
            autocomplete="off"
        >

        <button type="button" id="loadButton" class="button button-submit">
            一覧を表示
        </button>
    </div>

    <p id="resultMessage" class="result-message"></p>

    <div id="messageList" class="message-list"></div>

    <a class="button button-secondary" href="index.html">
        トップへ戻る
    </a>

</div>

<script>
const loadButton = document.getElementById("loadButton");
const resultMessage = document.getElementById("resultMessage");
const messageList = document.getElementById("messageList");
const adminKeyInput = document.getElementById("adminKey");

loadButton.addEventListener("click", async () => {
    const key = adminKeyInput.value.trim();

    if (!key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    resultMessage.textContent = "読み込み中です...";
    messageList.innerHTML = "";

    try {
        const response = await fetch(`/api/messages?key=${encodeURIComponent(key)}`);
        const data = await response.json();

        if (!data.ok) {
            resultMessage.textContent = data.message;
            return;
        }

        if (data.messages.length === 0) {
            resultMessage.textContent = "投稿はまだありません。";
            return;
        }

        resultMessage.textContent = `${data.messages.length}件の投稿があります。`;

        data.messages.forEach((item) => {
            const card = document.createElement("div");
            card.className = "message-card";

            const name = document.createElement("div");
            name.className = "message-name";
            name.textContent = item.name;

            const date = document.createElement("div");
            date.className = "message-date";
            date.textContent = formatDate(item.created_at);

            const message = document.createElement("div");
            message.className = "message-text";
            message.textContent = item.message;

            card.appendChild(name);
            card.appendChild(date);
            card.appendChild(message);

            messageList.appendChild(card);
        });

    } catch (error) {
        resultMessage.textContent = "通信に失敗しました。";
    }
});

function formatDate(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    });
}
</script>

</body>
</html>
