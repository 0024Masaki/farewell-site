<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理者用メッセージ一覧</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="site-nav site-nav-admin" data-site-nav>
    <a class="site-nav-home" href="/index.html" aria-label="TOPへ戻る" title="TOPへ戻る"><span aria-hidden="true">⌂</span></a>

    <button
        class="site-nav-toggle"
        type="button"
        aria-controls="siteNavMenu"
        aria-expanded="false"
        data-site-nav-toggle>
        <span class="site-nav-toggle-icon">☰</span>
        <span class="site-nav-toggle-text">メニュー</span>
    </button>

    <nav id="siteNavMenu" class="site-nav-links" data-site-nav-menu>
        <a href="/admin/index.html">管理者TOP</a>
        <a href="/admin/summary_settings.html">まとめ設定</a>
        <a href="/summary.html">投稿まとめ</a>
        <a href="/index.html">サイトTOP</a>
    </nav>
</header>


<div class="card wide-card">

<h1>管理者用メッセージ一覧</h1>

<input id="adminKey" class="input" type="password" placeholder="管理用パスキー">

<p id="resultMessage" class="result-message"></p>

<div id="messageList" class="message-list"></div>
<a class="button button-secondary" href="index.html">管理者メニューへ戻る</a>
<a class="button button-secondary" href="../index.html">トップへ戻る</a>

</div>

<script>
const params = new URLSearchParams(location.search);
const recipientId = params.get("id") || "person1";

const adminKey = document.getElementById("adminKey");
const resultMessage = document.getElementById("resultMessage");
const messageList = document.getElementById("messageList");

adminKey.addEventListener("change", loadMessages);

const savedKey = sessionStorage.getItem("adminKey");

if (savedKey) {
    adminKey.value = savedKey;
    loadMessages();
}

async function loadMessages() {
    const key = adminKey.value.trim();

    if (!key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    const response = await fetch(
        `/api/messages?key=${encodeURIComponent(key)}&recipient_id=${encodeURIComponent(recipientId)}`
    );

    const data = await response.json();

    messageList.innerHTML = "";

    if (!data.ok) {
        resultMessage.textContent = data.message;
        adminKey.hidden = false;
        return;
    }

    sessionStorage.setItem("adminKey", key);

    adminKey.hidden = true;

    if (data.messages.length === 0) {
        resultMessage.textContent = "投稿はまだありません。";
        return;
    }

    resultMessage.textContent = `${data.messages.length}件あります。`;

    data.messages.forEach(item => {
        const card = document.createElement("div");
        card.className = "message-card";

        card.innerHTML = `
            <div class="message-name">${escapeHtml(item.name || "匿名")}</div>
            <div class="message-date">${formatDate(item.created_at)}</div>
            <div class="message-text">${escapeHtml(item.message || "")}</div>
            <button class="button danger-button" type="button">削除</button>
        `;

        card.querySelector("button").addEventListener("click", () => {
            deleteMessage(item.id);
        });

        messageList.appendChild(card);
    });
}

async function deleteMessage(id) {
    if (!confirm("このメッセージを削除しますか？")) {
        return;
    }

    const response = await fetch("/api/admin_message_delete", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
            key: adminKey.value.trim(),
            id
        })
    });

    const data = await response.json();
    resultMessage.textContent = data.message;

    if (data.ok) {
        loadMessages();
    }
}

function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value;
    return div.innerHTML;
}

function formatDate(value) {
    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    });
}
</script>

<script src="/site_nav.js" defer></script>
</body>
</html>
