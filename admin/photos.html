<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理者用写真一覧</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="card wide-card">

<h1>管理者用写真一覧</h1>

<input id="adminKey" class="input" type="password" placeholder="管理用パスキー">

<p id="resultMessage" class="result-message"></p>

<div id="photoList" class="gallery-grid"></div>

<a class="button button-secondary" href="../index.html">トップへ戻る</a>

</div>

<script>
const params = new URLSearchParams(location.search);
const recipientId = params.get("id") || "person1";

const adminKey = document.getElementById("adminKey");
const resultMessage = document.getElementById("resultMessage");
const photoList = document.getElementById("photoList");

adminKey.addEventListener("change", loadPhotos);

async function loadPhotos() {
    const key = adminKey.value.trim();

    if (!key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    const response = await fetch(
        `/api/admin_photos?key=${encodeURIComponent(key)}&recipient_id=${encodeURIComponent(recipientId)}`
    );

    const data = await response.json();

    photoList.innerHTML = "";

    if (!data.ok) {
        resultMessage.textContent = data.message;
        return;
    }

    if (data.photos.length === 0) {
        resultMessage.textContent = "写真はまだありません。";
        return;
    }

    resultMessage.textContent = `${data.photos.length}枚あります。`;

    data.photos.forEach(photo => {
        const imageUrl =
            `https://drive.google.com/thumbnail?id=${encodeURIComponent(photo.drive_file_id)}&sz=w600`;

        const card = document.createElement("div");
        card.className = "gallery-card";

        card.innerHTML = `
            <img src="${imageUrl}" alt="photo">

            <div class="gallery-info">
                <div class="gallery-name">${escapeHtml(photo.name || "匿名")}</div>
                <div class="gallery-comment">${escapeHtml(photo.comment || "")}</div>
                <div class="gallery-date">${formatDate(photo.created_at)}</div>
                <button class="button danger-button" type="button">削除</button>
            </div>
        `;

        card.querySelector("button").addEventListener("click", () => {
            deletePhoto(photo.id, photo.drive_file_id);
        });

        photoList.appendChild(card);
    });
}

async function deletePhoto(id, driveFileId) {
    if (!confirm("この写真を削除しますか？")) {
        return;
    }

    const response = await fetch("/api/admin_photo_delete", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
            key: adminKey.value.trim(),
            id,
            drive_file_id: driveFileId
        })
    });

    const data = await response.json();
    resultMessage.textContent = data.message;

    if (data.ok) {
        loadPhotos();
    }
}

function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value;
    return div.innerHTML;
}

function formatDate(value) {
    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleString("ja-JP", {
        year:"numeric",
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}
</script>

</body>
</html>
