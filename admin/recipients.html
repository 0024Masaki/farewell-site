<!-- recipients.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>紹介者管理</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="card wide-card">

<h1 id="pageTitle">紹介者管理</h1>

<input id="adminKey" class="input" type="password" placeholder="管理用パスキー">

<div id="adminPanel" class="form-area" hidden>
    <label class="form-label">ID</label>
    <input id="recipientId" class="input" placeholder="例：001">

    <label class="form-label">名前</label>
    <input id="name" class="input" placeholder="例：田中さん">

    <label class="form-label">タイトル</label>
    <input id="title" class="input" placeholder="例：ありがとうございました">

    <label class="form-label">顔写真</label>

    <div class="recipient-photo-admin">
        <div class="recipient-photo-preview">
            <img id="photoPreview" alt="顔写真プレビュー" hidden>
            <span id="photoPreviewText">未設定</span>
        </div>

        <input id="photoUrl" type="hidden">

        <input
            id="photoFile"
            class="input"
            type="file"
            accept="image/jpeg,image/png,image/webp"
        >

        <button id="uploadPhotoButton" class="button button-secondary" type="button">
            顔写真をアップロード
        </button>
    </div>

    <label class="form-label">紹介文</label>
    <textarea id="profileHtml" class="textarea" placeholder="紹介文を入力"></textarea>

    <label class="form-label">並び順</label>
    <input id="sortOrder" class="input" type="number" value="1">

    <label class="form-label">
        <input id="isActive" type="checkbox" checked>
        表示する
    </label>

    <div class="admin-button-row">
        <button id="createButton" class="button button-submit" type="button">新規追加</button>
        <button id="updateButton" class="button button-secondary" type="button">更新</button>
        <button id="clearButton" class="button button-secondary" type="button">入力クリア</button>
    </div>
</div>

<p id="resultMessage" class="result-message"></p>

<div id="adminListPanel" hidden>
    <h2>登録済み</h2>
    <div id="recipientList" class="message-list"></div>
</div>

<a class="button button-secondary" href="index.html">管理者メニューへ戻る</a>
        <a class="button button-secondary" href="../index.html">
            トップへ戻る
        </a>
</div>

<script>
const adminKey = document.getElementById("adminKey");
const resultMessage = document.getElementById("resultMessage");
const recipientList = document.getElementById("recipientList");
const adminPanel = document.getElementById("adminPanel");
const adminListPanel = document.getElementById("adminListPanel");
const photoUrl = document.getElementById("photoUrl");
const photoFile = document.getElementById("photoFile");
const photoPreview = document.getElementById("photoPreview");
const photoPreviewText = document.getElementById("photoPreviewText");
const maxOriginalPhotoBytes = 30 * 1024 * 1024;
const maxCompressedPhotoBytes = 700 * 1024;
const photoResizeMaxSize = 600;
const photoJpegQuality = 0.86;
const photoMinJpegQuality = 0.58;

document.getElementById("createButton").addEventListener("click", () => saveRecipient("POST"));
document.getElementById("updateButton").addEventListener("click", () => saveRecipient("PUT"));
document.getElementById("clearButton").addEventListener("click", clearForm);
document.getElementById("uploadPhotoButton").addEventListener("click", uploadRecipientPhoto);
adminKey.addEventListener("change", loadRecipients);

const savedKey = sessionStorage.getItem("adminKey");

if (savedKey) {
    adminKey.value = savedKey;
    loadRecipients();
}

async function loadRecipients() {
    const key = adminKey.value.trim();

    if (!key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    const response = await fetch(`/api/admin_recipients?key=${encodeURIComponent(key)}`);
    const data = await response.json();

    recipientList.innerHTML = "";

    if (!data.ok) {
        adminPanel.hidden = true;
        adminListPanel.hidden = true;
        adminKey.hidden = false;
        recipientList.innerHTML = "";
        resultMessage.textContent = data.message;
        return;
    }
    sessionStorage.setItem(
        "adminKey",
        key
    );
    adminPanel.hidden = false;
    adminListPanel.hidden = false;
    adminKey.hidden = true;

    data.recipients.forEach(item => {
        const div = document.createElement("div");
        div.className = "message-card";

        div.innerHTML = `
            <div class="message-name">${escapeHtml(item.name)} / ${escapeHtml(item.id)}</div>
            <div class="message-date">並び順：${item.sort_order} / 表示：${item.is_active ? "ON" : "OFF"}</div>
            <div class="message-text">${escapeHtml(item.title || "")}</div>

            <div class="admin-button-row">
                <button class="button button-secondary edit-button" type="button">編集</button>

                <a class="button button-secondary"
                href="../person.html?id=${encodeURIComponent(item.id)}"
                target="_blank">
                    紹介ページ確認
                </a>

                <a class="button button-secondary"
                href="messages.html?id=${encodeURIComponent(item.id)}">
                    コメント削除
                </a>

                <a class="button button-secondary"
                href="photos.html?id=${encodeURIComponent(item.id)}">
                    写真削除
                </a>

                <button class="button danger-button delete-button" type="button">非表示</button>
                <button class="button danger-button permanent-delete-button" type="button">完全削除</button>
            </div>
        `;

        div.querySelector(".edit-button").addEventListener("click", () => {

            document.getElementById("recipientId").value = item.id;
            document.getElementById("name").value = item.name;
            document.getElementById("title").value = item.title || "";
            photoUrl.value = item.photo_url || "";
            updatePhotoPreview(photoUrl.value);
            document.getElementById("profileHtml").value = item.profile_html || "";
            document.getElementById("sortOrder").value = item.sort_order || 0;
            document.getElementById("isActive").checked = Boolean(item.is_active);

            adminPanel.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
            document.getElementById("pageTitle").textContent =
                `送別者編集 : ${item.name}`;

            setTimeout(() => {
                document.getElementById("name").focus();
            }, 400);

        });

        div.querySelector(".delete-button").addEventListener("click", () => {
            deleteRecipient(item.id);
        });

        div.querySelector(".permanent-delete-button").addEventListener("click", () => {
            permanentDeleteRecipient(
                item.id,
                item.name
            );
        });

        recipientList.appendChild(div);
    });

    resultMessage.textContent = `${data.recipients.length}件あります。`;
}

async function saveRecipient(method) {
    const payload = buildPayload();

    if (!payload.key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    if (!payload.id || !payload.name) {
        resultMessage.textContent = "IDと名前は必須です。";
        return;
    }

    const response = await fetch("/api/admin_recipients", {
        method,
        headers:{ "content-type":"application/json" },
        body:JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok || !data.ok) {
        resultMessage.textContent =
            data.detail
                ? `${data.message} : ${data.detail}`
                : (data.message || "処理に失敗しました。");
        return;
    }

    resultMessage.textContent = data.message || "処理が完了しました。";

    await loadRecipients();

    if (method === "POST") {
        clearForm(false);
    }
}

function buildPayload() {
    return {
        key: adminKey.value.trim(),
        id: document.getElementById("recipientId").value.trim(),
        name: document.getElementById("name").value.trim(),
        title: document.getElementById("title").value.trim(),
        photo_url: document.getElementById("photoUrl").value.trim(),
        profile_html: document.getElementById("profileHtml").value.trim(),
        sort_order: document.getElementById("sortOrder").value,
        is_active: document.getElementById("isActive").checked
    };
}

function clearForm(showMessage = true) {
    document.getElementById("recipientId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("title").value = "";
    photoUrl.value = "";
    photoFile.value = "";
    updatePhotoPreview("");
    document.getElementById("photoUrl").value = "";
    document.getElementById("profileHtml").value = "";
    document.getElementById("sortOrder").value = "1";
    document.getElementById("isActive").checked = true;
    document.getElementById("pageTitle").textContent =
        "送別者管理";

    if (showMessage) {
        resultMessage.textContent = "入力欄をクリアしました。";
    }
}

async function deleteRecipient(id) {
    if (!adminKey.value.trim()) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    if (!confirm("この送別者を非表示にしますか？")) {
        return;
    }

    const response = await fetch("/api/admin_recipients", {
        method:"DELETE",
        headers:{ "content-type":"application/json" },
        body:JSON.stringify({
            key: adminKey.value.trim(),
            id
        })
    });

    const data = await response.json();
    resultMessage.textContent = data.message;

    if (data.ok) {
        loadRecipients();
    }
}

async function permanentDeleteRecipient(id, name) {
    if (!adminKey.value.trim()) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    const firstConfirm =
        confirm(`${name} を完全削除しますか？\nコメント・写真データも削除されます。`);

    if (!firstConfirm) {
        return;
    }

    const secondConfirm =
        confirm("本当に完全削除しますか？この操作は元に戻せません。");

    if (!secondConfirm) {
        return;
    }

    const response = await fetch("/api/admin_recipients", {
        method:"DELETE",
        headers:{ "content-type":"application/json" },
        body:JSON.stringify({
            key: adminKey.value.trim(),
            id,
            action:"permanent_delete"
        })
    });

    const data = await response.json();
    resultMessage.textContent = data.message;

    if (data.ok) {
        clearForm(false);
        loadRecipients();
    }
}

async function uploadRecipientPhoto() {
    const file = photoFile.files[0];

    if (!adminKey.value.trim()) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    if (!file) {
        resultMessage.textContent = "顔写真を選択してください。";
        return;
    }

    const fileError = getImageFileError(file);

    if (fileError) {
        resultMessage.textContent = fileError;
        return;
    }

    resultMessage.textContent = "顔写真をアップロード中です...";

    try {
        const compressedFile = await compressImage(file);
        const base64 = await fileToBase64(compressedFile);

        const response = await fetch("/api/admin_recipient_photo", {
            method:"POST",
            headers:{
                "content-type":"application/json"
            },
            body:JSON.stringify({
                key:adminKey.value.trim(),
                fileName:compressedFile.name,
                mimeType:compressedFile.type,
                base64:base64
            })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
            resultMessage.textContent =
                data.detail
                    ? `${data.message || "顔写真アップロードに失敗しました。"}：${data.detail}`
                    : data.message || "顔写真アップロードに失敗しました。";
            return;
        }

        photoUrl.value = data.photo_url;
        updatePhotoPreview(data.photo_url);
        resultMessage.textContent = "顔写真を設定しました。更新または新規追加を押してください。";

    } catch (error) {
        resultMessage.textContent =
            error && error.message
                ? error.message
                : "顔写真アップロードに失敗しました。";
    }
}

function updatePhotoPreview(url) {
    if (!url) {
        photoPreview.hidden = true;
        photoPreview.removeAttribute("src");
        photoPreviewText.hidden = false;
        return;
    }

    photoPreview.src = url;
    photoPreview.hidden = false;
    photoPreviewText.hidden = true;
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        if (file.size > maxCompressedPhotoBytes) {
            reject(
                new Error(
                    `写真サイズが大きすぎます。${getReadableFileSize(maxCompressedPhotoBytes)}以下の写真にしてください。`
                )
            );
            return;
        }

        const reader = new FileReader();

        reader.onload = () => {
            const result = String(reader.result);
            const base64 = result.split(",")[1] || "";
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error || new Error("写真を読み込めませんでした。"));
        reader.readAsDataURL(file);
    });
}

async function compressImage(file) {
    let loadedImage = null;

    try {
        loadedImage = await loadImageFromFile(file);

        const image = loadedImage.image;
        const originalWidth = Number(image.naturalWidth || image.width || 0);
        const originalHeight = Number(image.naturalHeight || image.height || 0);

        if (!originalWidth || !originalHeight) {
            throw new Error("写真サイズを確認できませんでした。");
        }

        const scale = Math.min(
            1,
            photoResizeMaxSize / Math.max(originalWidth, originalHeight)
        );

        const width = Math.max(1, Math.round(originalWidth * scale));
        const height = Math.max(1, Math.round(originalHeight * scale));

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d", { alpha: false });

        if (!ctx) {
            throw new Error("写真の変換に失敗しました。");
        }

        ctx.drawImage(image, 0, 0, width, height);

        let quality = photoJpegQuality;
        let blob = await canvasToBlob(canvas, quality);

        while (blob.size > maxCompressedPhotoBytes && quality > photoMinJpegQuality) {
            quality = Math.max(photoMinJpegQuality, quality - 0.08);
            blob = await canvasToBlob(canvas, quality);
        }

        canvas.width = 1;
        canvas.height = 1;

        if (blob.size > maxCompressedPhotoBytes) {
            throw new Error(
                `写真サイズが大きすぎます。${getReadableFileSize(maxOriginalPhotoBytes)}以下の別写真を選択してください。`
            );
        }

        return new File([blob], changeExtensionToJpeg(file.name), {
            type: "image/jpeg"
        });

    } finally {
        if (loadedImage) {
            URL.revokeObjectURL(loadedImage.objectUrl);
        }
    }
}

function getPhotoFileError(files) {
    for (const file of files) {
        const message = getImageFileError(file);

        if (message) {
            return `${file.name}：${message}`;
        }
    }

    return "";
}

function getImageFileError(file) {
    if (!file) {
        return "写真を選択してください。";
    }

    if (!["image/jpeg", "image/png", "image/webp"].includes(file.type)) {
        return "JPEG、PNG、WebP の写真を選択してください。";
    }

    if (file.size > maxOriginalPhotoBytes) {
        return `写真サイズが大きすぎます。${getReadableFileSize(maxOriginalPhotoBytes)}以下の写真を選択してください。`;
    }

    return "";
}

function loadImageFromFile(file) {
    return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(file);
        const image = new Image();

        image.onload = () => {
            resolve({
                image,
                objectUrl
            });
        };

        image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("写真を読み込めませんでした。"));
        };

        image.src = objectUrl;
    });
}

function canvasToBlob(canvas, quality) {
    return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
            if (!blob) {
                reject(new Error("写真の圧縮に失敗しました。"));
                return;
            }

            resolve(blob);
        }, "image/jpeg", quality);
    });
}

function changeExtensionToJpeg(fileName) {
    const baseName = String(fileName || "photo")
        .replace(/\.[^.]*$/, "")
        .trim();

    return `${baseName || "photo"}.jpg`;
}

function getReadableFileSize(bytes) {
    return `${Math.round(bytes / 1024 / 1024 * 10) / 10}MB`;
}

function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value;
    return div.innerHTML;
}
</script>

</body>
</html>
