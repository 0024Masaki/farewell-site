<!-- recipients.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>送別者管理</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="card wide-card">

<h1 id="pageTitle">送別者管理</h1>

<!-- <input id="adminKey" class="input" type="password" placeholder="管理用パスキー"> -->

<div id="adminPanel" class="form-area" hidden>
    <label class="form-label">ID</label>
    <input id="recipientId" class="input" placeholder="例：001">

    <label class="form-label">名前</label>
    <input id="name" class="input" placeholder="例：田中さん">

    <label class="form-label">タイトル</label>
    <input id="title" class="input" placeholder="例：ありがとうございました">

    <label class="form-label">紹介文</label>
    <textarea id="profileHtml" class="textarea" placeholder="紹介文を入力"></textarea>

    <label class="form-label">並び順</label>
    <input id="sortOrder" class="input" type="number" value="1">

    <label class="form-label">
        <input id="isActive" type="checkbox" checked>
        表示する
    </label>

    <div class="admin-button-row">
        <button id="createButton" class="button button-submit" type="button">新規追加</button>
        <button id="updateButton" class="button button-secondary" type="button">更新</button>
        <button id="clearButton" class="button button-secondary" type="button">入力クリア</button>
    </div>
</div>

<p id="resultMessage" class="result-message"></p>

<div id="adminListPanel" hidden>
    <h2>登録済み</h2>
    <div id="recipientList" class="message-list"></div>
</div>

<a class="button button-secondary" href="index.html">管理者メニューへ戻る</a>

</div>

<script>
const adminKey = document.getElementById("adminKey");
const resultMessage = document.getElementById("resultMessage");
const recipientList = document.getElementById("recipientList");
const adminPanel = document.getElementById("adminPanel");
const adminListPanel = document.getElementById("adminListPanel");

document.getElementById("createButton").addEventListener("click", () => saveRecipient("POST"));
document.getElementById("updateButton").addEventListener("click", () => saveRecipient("PUT"));
document.getElementById("clearButton").addEventListener("click", clearForm);
adminKey.addEventListener("change", loadRecipients);

const savedKey = sessionStorage.getItem("adminKey");

if (savedKey) {
    adminKey.value = savedKey;
    loadRecipients();
}

async function loadRecipients() {
    const key = adminKey.value.trim();

    if (!key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    const response = await fetch(`/api/admin_recipients?key=${encodeURIComponent(key)}`);
    const data = await response.json();

    recipientList.innerHTML = "";

    if (!data.ok) {
        adminPanel.hidden = true;
        adminListPanel.hidden = true;
        recipientList.innerHTML = "";
        resultMessage.textContent = data.message;
        return;
    }
    sessionStorage.setItem(
        "adminKey",
        key
    );
    adminPanel.hidden = false;
    adminListPanel.hidden = false;

    data.recipients.forEach(item => {
        const div = document.createElement("div");
        div.className = "message-card";

        div.innerHTML = `
            <div class="message-name">${escapeHtml(item.name)} / ${escapeHtml(item.id)}</div>
            <div class="message-date">並び順：${item.sort_order} / 表示：${item.is_active ? "ON" : "OFF"}</div>
            <div class="message-text">${escapeHtml(item.title || "")}</div>

            <div class="admin-button-row">
                <button class="button button-secondary edit-button" type="button">編集</button>

                <a class="button button-secondary"
                href="../person.html?id=${encodeURIComponent(item.id)}"
                target="_blank">
                    紹介ページ確認
                </a>

                <a class="button button-secondary"
                href="messages.html?id=${encodeURIComponent(item.id)}">
                    コメント削除
                </a>

                <a class="button button-secondary"
                href="photos.html?id=${encodeURIComponent(item.id)}">
                    写真削除
                </a>

                <button class="button danger-button delete-button" type="button">非表示</button>
                <button class="button danger-button permanent-delete-button" type="button">完全削除</button>
            </div>
        `;

        div.querySelector(".edit-button").addEventListener("click", () => {

            document.getElementById("recipientId").value = item.id;
            document.getElementById("name").value = item.name;
            document.getElementById("title").value = item.title || "";
            document.getElementById("profileHtml").value = item.profile_html || "";
            document.getElementById("sortOrder").value = item.sort_order || 0;
            document.getElementById("isActive").checked = Boolean(item.is_active);

            adminPanel.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
            document.getElementById("pageTitle").textContent =
                `送別者編集 : ${item.name}`;

            setTimeout(() => {
                document.getElementById("name").focus();
            }, 400);

        });

        div.querySelector(".delete-button").addEventListener("click", () => {
            deleteRecipient(item.id);
        });

        div.querySelector(".permanent-delete-button").addEventListener("click", () => {
            permanentDeleteRecipient(
                item.id,
                item.name
            );
        });

        recipientList.appendChild(div);
    });

    resultMessage.textContent = `${data.recipients.length}件あります。`;
}

async function saveRecipient(method) {
    const payload = buildPayload();

    if (!payload.key) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    if (!payload.id || !payload.name) {
        resultMessage.textContent = "IDと名前は必須です。";
        return;
    }

    const response = await fetch("/api/admin_recipients", {
        method,
        headers:{ "content-type":"application/json" },
        body:JSON.stringify(payload)
    });

    const data = await response.json();
    resultMessage.textContent = data.message || "処理が完了しました。";

    if (data.ok) {
        await loadRecipients();

        if (method === "POST") {
            clearForm(false);
        }
    }
}

function buildPayload() {
    return {
        key: adminKey.value.trim(),
        id: document.getElementById("recipientId").value.trim(),
        name: document.getElementById("name").value.trim(),
        title: document.getElementById("title").value.trim(),
        profile_html: document.getElementById("profileHtml").value.trim(),
        sort_order: document.getElementById("sortOrder").value,
        is_active: document.getElementById("isActive").checked
    };
}

function clearForm(showMessage = true) {
    document.getElementById("recipientId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("title").value = "";
    document.getElementById("profileHtml").value = "";
    document.getElementById("sortOrder").value = "1";
    document.getElementById("isActive").checked = true;
    document.getElementById("pageTitle").textContent =
        "送別者管理";

    if (showMessage) {
        resultMessage.textContent = "入力欄をクリアしました。";
    }
}

async function deleteRecipient(id) {
    if (!adminKey.value.trim()) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    if (!confirm("この送別者を非表示にしますか？")) {
        return;
    }

    const response = await fetch("/api/admin_recipients", {
        method:"DELETE",
        headers:{ "content-type":"application/json" },
        body:JSON.stringify({
            key: adminKey.value.trim(),
            id
        })
    });

    const data = await response.json();
    resultMessage.textContent = data.message;

    if (data.ok) {
        loadRecipients();
    }
}

async function permanentDeleteRecipient(id, name) {
    if (!adminKey.value.trim()) {
        resultMessage.textContent = "管理用パスキーを入力してください。";
        return;
    }

    const firstConfirm =
        confirm(`${name} を完全削除しますか？\nコメント・写真データも削除されます。`);

    if (!firstConfirm) {
        return;
    }

    const secondConfirm =
        confirm("本当に完全削除しますか？この操作は元に戻せません。");

    if (!secondConfirm) {
        return;
    }

    const response = await fetch("/api/admin_recipients", {
        method:"DELETE",
        headers:{ "content-type":"application/json" },
        body:JSON.stringify({
            key: adminKey.value.trim(),
            id,
            action:"permanent_delete"
        })
    });

    const data = await response.json();
    resultMessage.textContent = data.message;

    if (data.ok) {
        clearForm(false);
        loadRecipients();
    }
}

function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value;
    return div.innerHTML;
}
</script>

</body>
</html>
