<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メッセージ一覧</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card wide-card">

    <h1>メッセージ一覧</h1>

    <p class="subtitle">
        皆様から寄せられたメッセージです
    </p>

    <p id="resultMessage" class="result-message">読み込み中です...</p>

    <div id="messageList" class="message-list"></div>

    <a id="backLink" class="button button-secondary" href="index.html">
        戻る
    </a>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const recipientId = params.get("id") || "person1";

const resultMessage = document.getElementById("resultMessage");
const messageList = document.getElementById("messageList");
const backLink = document.getElementById("backLink");

backLink.href = `person.html?id=${encodeURIComponent(recipientId)}`;

loadMessages();

async function loadMessages() {
    try {
        const response = await fetch(
            `/api/public_messages?recipient_id=${encodeURIComponent(recipientId)}`
        );

        const data = await response.json();

        if (!data.ok) {
            resultMessage.textContent = data.message;
            return;
        }

        if (data.messages.length === 0) {
            resultMessage.textContent = "投稿はまだありません。";
            return;
        }

        resultMessage.textContent = `${data.messages.length}件のメッセージがあります。`;
        messageList.innerHTML = "";

        data.messages.forEach((item) => {
            const card = document.createElement("div");
            card.className = "message-card";

            const name = document.createElement("div");
            name.className = "message-name";
            name.textContent = item.name || "匿名";

            const date = document.createElement("div");
            date.className = "message-date";
            date.textContent = formatDate(item.created_at);

            const message = document.createElement("div");
            message.className = "message-text";
            message.textContent = item.message;

            card.appendChild(name);
            card.appendChild(date);
            card.appendChild(message);

            messageList.appendChild(card);
        });

    } catch (error) {
        resultMessage.textContent = "通信に失敗しました。";
    }
}

function formatDate(value) {
    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    });
}
</script>

</body>
</html>
